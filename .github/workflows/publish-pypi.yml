name: Publish PyPI (Manual)

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Git tag to publish (for example v0.1.1)"
        required: true
        type: string

jobs:
  publish_pypi:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - name: Checkout tag
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Validate tag format
        shell: bash
        run: |
          if [[ ! "${{ inputs.tag }}" =~ ^v[0-9]+\\.[0-9]+\\.[0-9]+$ ]]; then
            echo "Tag must match vMAJOR.MINOR.PATCH (for example v0.1.1)."
            exit 1
          fi

      - name: Install dependencies
        run: uv sync --extra dev --extra postgres

      - name: Lint
        run: uv run python -m ruff check src tests

      - name: Type check
        run: uv run python -m mypy src

      - name: Unit tests
        run: uv run python -m pytest tests/unit/ -q

      - name: Build distributions
        run: uv build

      - name: Install Twine
        run: python -m pip install --upgrade pip twine

      - name: Validate distributions
        run: python -m twine check dist/*

      - name: Smoke test built wheel
        shell: bash
        run: |
          python -m venv /tmp/sift-smoke
          source /tmp/sift-smoke/bin/activate
          python -m pip install --upgrade pip
          python -m pip install dist/*.whl
          sift-mcp --help > /dev/null
          sift-mcp --version

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
