name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --extra dev --extra postgres

      - name: Lint
        run: uv run python -m ruff check src tests

      - name: Docs consistency
        run: PYTHONPATH=src uv run python scripts/check_docs_consistency.py

      - name: Type check
        run: uv run python -m mypy src

      - name: Unit tests
        run: uv run python -m pytest tests/unit/ -q
