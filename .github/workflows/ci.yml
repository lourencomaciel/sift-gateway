name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: uv sync --extra dev --extra postgres

      - name: Lint
        run: uv run python -m ruff check src tests

      - name: Type check
        run: uv run python -m mypy src

      - name: Unit tests
        run: uv run python -m pytest tests/unit/ -q
