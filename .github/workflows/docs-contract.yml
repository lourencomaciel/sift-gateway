name: Docs Contract

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  docs-contract:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Docs consistency
        run: PYTHONPATH=src uv run python scripts/check_docs_consistency.py
