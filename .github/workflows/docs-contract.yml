name: Docs Contract

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  docs-contract:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --extra dev --extra postgres

      - name: Docs consistency
        run: PYTHONPATH=src uv run python scripts/check_docs_consistency.py
