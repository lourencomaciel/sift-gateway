name: ClawHub Sync

on:
  push:
    branches:
      - main
    paths:
      - "docs/openclaw/**"
      - ".github/workflows/clawhub-sync.yml"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install ClawHub CLI
        run: npm i -g clawhub

      - name: Validate ClawHub token
        env:
          CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}
        run: |
          if [ -z "${CLAWHUB_TOKEN}" ]; then
            echo "Missing CLAWHUB_TOKEN secret."
            echo "Add it in GitHub repository settings: Secrets and variables > Actions."
            exit 1
          fi

      - name: Authenticate ClawHub CLI
        env:
          CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}
        run: clawhub login --token "${CLAWHUB_TOKEN}" --no-browser

      - name: Sync OpenClaw skill
        run: >
          clawhub sync
          --all
          --root docs/openclaw
          --bump patch
          --changelog "Automated sync from ${{ github.repository }}@${{ github.sha }}"
          --tags latest
          --no-input
