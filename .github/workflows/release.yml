name: Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  prepare_release:
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.meta.outputs.should_release }}
      version: ${{ steps.meta.outputs.version }}
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Determine release metadata
        id: meta
        shell: bash
        run: |
          version="$(python - <<'PY'
          import tomllib
          from pathlib import Path

          pyproject = tomllib.loads(
              Path("pyproject.toml").read_text(encoding="utf-8")
          )
          print(pyproject["project"]["version"])
          PY
          )"
          tag="v${version}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            if [[ "${GITHUB_REF_NAME}" != "${tag}" ]]; then
              echo "Tag ${GITHUB_REF_NAME} does not match package version ${version}" >&2
              exit 1
            fi
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git fetch --tags --force
          if git rev-parse -q --verify "refs/tags/${tag}" >/dev/null; then
            echo "Version ${version} already has tag ${tag}; skipping release."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "should_release=true" >> "$GITHUB_OUTPUT"

  verify_build:
    needs: prepare_release
    if: needs.prepare_release.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Lint
        run: uv run python -m ruff check src tests

      - name: Docs consistency
        run: PYTHONPATH=src uv run python scripts/check_docs_consistency.py

      - name: Type check
        run: uv run python -m mypy src

      - name: Unit tests
        run: uv run python -m pytest tests/unit/ -q

      - name: Build distributions
        run: uv build

      - name: Install Twine
        run: python -m pip install --upgrade pip twine

      - name: Validate distributions
        run: python -m twine check dist/*

      - name: Smoke test built wheel
        shell: bash
        run: |
          python -m venv /tmp/sift-smoke
          source /tmp/sift-smoke/bin/activate
          python -m pip install --upgrade pip
          python -m pip install dist/*.whl
          sift-gateway --help > /dev/null
          sift-gateway --version

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/*

  publish_testpypi:
    needs:
      - prepare_release
      - verify_build
    if: needs.prepare_release.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    environment: testpypi
    permissions:
      id-token: write
    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  publish_pypi:
    needs:
      - prepare_release
      - verify_build
      - publish_testpypi
    if: needs.prepare_release.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  github_release:
    needs:
      - prepare_release
      - publish_pypi
    if: needs.prepare_release.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download dist artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.prepare_release.outputs.tag }}
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            gh release create "${RELEASE_TAG}" dist/* \
              --title "${RELEASE_TAG}" \
              --generate-notes
          else
            gh release create "${RELEASE_TAG}" dist/* \
              --title "${RELEASE_TAG}" \
              --generate-notes \
              --target "${GITHUB_SHA}"
          fi
