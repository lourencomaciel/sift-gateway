name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  verify_build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Lint
        run: uv run python -m ruff check src tests

      - name: Docs consistency
        run: PYTHONPATH=src uv run python scripts/check_docs_consistency.py

      - name: Type check
        run: uv run python -m mypy src

      - name: Unit tests
        run: uv run python -m pytest tests/unit/ -q

      - name: Build distributions
        run: uv build

      - name: Install Twine
        run: python -m pip install --upgrade pip twine

      - name: Validate distributions
        run: python -m twine check dist/*

      - name: Smoke test built wheel
        shell: bash
        run: |
          python -m venv /tmp/sift-smoke
          source /tmp/sift-smoke/bin/activate
          python -m pip install --upgrade pip
          python -m pip install dist/*.whl
          sift-gateway --help > /dev/null
          sift-gateway --version

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/*

  publish_testpypi:
    needs: verify_build
    runs-on: ubuntu-latest
    environment: testpypi
    permissions:
      id-token: write
    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  publish_pypi:
    needs:
      - verify_build
      - publish_testpypi
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  github_release:
    needs: publish_pypi
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download dist artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >
          gh release create "${{ github.ref_name }}"
          dist/*
          --title "${{ github.ref_name }}"
          --generate-notes
