services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: mcp_gateway
      POSTGRES_PASSWORD: mcp_gateway
      POSTGRES_DB: mcp_gateway
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mcp_gateway"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
